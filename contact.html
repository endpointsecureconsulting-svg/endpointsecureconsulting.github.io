<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Endpoint Secure Consulting</title>
  <meta name="description" content="Secure live chat with Endpoint Secure Consulting.">

  <!-- Cookie acceptance -->
  <script>
    document.cookie = "cookie_terms_accepted=true; path=/; max-age=31536000";
  </script>

  <!-- GoDaddy / Reamaze -->
  <script async src="https://cdn.reamaze.com/assets/reamaze-godaddy-loader.js"></script>

  <script>
    var _support = _support || { ui: {}, user: {} };

    _support.account = "ba6a9e34-22c9-460c-a706-0b33aeb2ff05";

    _support.ui.contactMode = "default";
    _support.ui.enableKb = "false";
    _support.ui.mailbox = "80064145";

    _support.ui.styles = {
      widgetColor: "#0b1f3a"
    };

    _support.ui.shoutboxFacesMode = "brand-avatar";

    _support.ui.widget = {
      icon: "webChat",
      slug: "endpoint-secure-consulting",
      position: "bottom-right",
      label: {
        text: "Talk to Endpoint Secure Consulting",
        mode: "notification",
        delay: 0
      }
    };

    function openFullscreenChat(retries = 120) {
      /* Step 1: Open widget */
      if (typeof Reamaze !== "undefined") {
        try {
          Reamaze("open");
        } catch (e) {}
      }

      /* Step 2: Click launcher if visible */
      const launcher =
        document.querySelector(".js-rezai-launcher") ||
        document.querySelector('[aria-label*="chat"]') ||
        document.querySelector('[aria-label*="message"]') ||
        document.querySelector('[class*="reamaze"]');

      if (launcher) {
        launcher.click();
      }

      /* Step 3: Click Send a Message */
      setTimeout(function () {
        const allEls = Array.from(
          document.querySelectorAll("button, a, div, span")
        );

        const sendBtn = allEls.find(el =>
          el.innerText &&
          el.innerText.trim().toLowerCase().includes("send a message")
        );

        if (sendBtn) {
          sendBtn.click();
        }

        /* Step 4: Force widget fullscreen */
        const widgetContainers = document.querySelectorAll(
          "iframe, .reamaze-widget, .reamaze-widget-container, .reamaze-chat, .reamaze-chat-container, [class*='reamaze']"
        );

        widgetContainers.forEach(function (el) {
          el.style.position = "fixed";
          el.style.top = "0";
          el.style.left = "0";
          el.style.width = "100vw";
          el.style.height = "100vh";
          el.style.maxWidth = "100vw";
          el.style.maxHeight = "100vh";
          el.style.minWidth = "100vw";
          el.style.minHeight = "100vh";
          el.style.zIndex = "999999999";
          el.style.borderRadius = "0";
          el.style.margin = "0";
          el.style.padding = "0";
        });

      }, 2000);

      /* Retry until successful */
      if (retries > 0) {
        setTimeout(function () {
          openFullscreenChat(retries - 1);
        }, 500);
      }
    }

    window.onload = function () {
      setTimeout(function () {
        openFullscreenChat();
      }, 1200);
    };
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    body > *:not(script) {
      display: none !important;
    }
  </style>
</head>

<body>
</body>
</html>
