<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Endpoint Secure Consulting</title>
  <meta name="description" content="Connect with Endpoint Secure Consulting instantly.">
  <link rel="stylesheet" href="styles.css">

  <!-- Cookie acceptance -->
  <script>
    document.cookie = "cookie_terms_accepted=true; path=/; max-age=31536000";
  </script>

  <!-- GoDaddy / Reamaze -->
  <script async src="https://cdn.reamaze.com/assets/reamaze-godaddy-loader.js"></script>

  <script>
    var _support = _support || { ui: {}, user: {} };

    _support.account = "ba6a9e34-22c9-460c-a706-0b33aeb2ff05";

    _support.ui.contactMode = "default";
    _support.ui.enableKb = "false";
    _support.ui.mailbox = "80064145";

    _support.ui.styles = {
      widgetColor: "#0b1f3a"
    };

    _support.ui.shoutboxFacesMode = "brand-avatar";

    _support.ui.widget = {
      icon: "webChat",
      slug: "endpoint-secure-consulting",
      position: "bottom-right",
      label: {
        text: "Talk to Endpoint Secure Consulting",
        mode: "notification",
        delay: 0
      }
    };

    function autoStartChat(retries = 60) {
      /* Step 1: Try official API */
      if (typeof Reamaze !== "undefined") {
        try {
          Reamaze("open");
        } catch (e) {}
      }

      /* Step 2: Force click launcher bubble */
      const possibleLaunchers = [
        '.js-rezai-launcher',
        '[aria-label*="chat"]',
        '[aria-label*="message"]',
        '[class*="reamaze-launcher"]',
        '[class*="widget-launcher"]',
        '[id*="reamaze"]'
      ];

      for (let selector of possibleLaunchers) {
        const launcher = document.querySelector(selector);

        if (launcher) {
          launcher.click();

          /* Step 3: After widget opens, auto-click Send a Message */
          setTimeout(function () {
            const allElements = Array.from(
              document.querySelectorAll("button, a, div, span")
            );

            const sendMessageBtn = allElements.find(el =>
              el.innerText &&
              el.innerText.trim().toLowerCase().includes("send a message")
            );

            if (sendMessageBtn) {
              sendMessageBtn.click();
            }
          }, 1500);

          return;
        }
      }

      /* Retry until widget fully loads */
      if (retries > 0) {
        setTimeout(function () {
          autoStartChat(retries - 1);
        }, 500);
      }
    }

    window.onload = function () {
      setTimeout(function () {
        autoStartChat();
      }, 2000);
    };
  </script>
</head>

<body>

<header class="navbar">
  <div class="container nav-wrapper">
    <div class="logo">Endpoint Secure Consulting</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="page-header">
  <div class="container" style="text-align:center;">
    <h1>Contact Endpoint Secure Consulting</h1>
    <p>
      We’ve opened secure chat for you automatically.
    </p>
    <p>
      If it doesn’t appear immediately, use the chat window on the right.
    </p>
  </div>
</section>

<footer>
  <div class="container">
    <p>© 2026 Endpoint Secure Consulting. All rights reserved.</p>
  </div>
</footer>

</body>
</html>
