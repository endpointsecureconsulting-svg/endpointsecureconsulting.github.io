<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Endpoint Secure Consulting</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="navbar">
  <div class="container nav-wrapper">
    <div class="logo">Endpoint Secure Consulting</div>
  </div>
</header>

<section class="page-header">
  <div class="container">
    <h1>Contact Us</h1>
    <p>Ready to modernize endpoint security? Let’s talk.</p>
  </div>
</section>

<section class="container content-section">
  <form class="contact-form">
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea placeholder="Your Security Needs"></textarea>
    <button type="submit" class="btn primary">Submit</button>
  </form>
</section>

<footer><div class="container"><p>© 2026 Endpoint Secure Consulting</p></div></footer>
  <!-- PLACE THIS RIGHT BEFORE </body> ON EVERY PAGE (index.html, services.html, about.html, contact.html) -->

<script type="text/javascript" async src="https://cdn.reamaze.com/assets/reamaze-godaddy-loader.js"></script>
<script type="text/javascript">
  var _support = _support || { ui: {}, user: {} };

  _support.account = "ba6a9e34-22c9-460c-a706-0b33aeb2ff05";

  /* Core UI */
  _support.ui.contactMode = "default";
  _support.ui.enableKb = "false";
  _support.ui.mailbox = "80064145";

  /* Branding */
  _support.ui.styles = {
    widgetColor: "#0b1f3a"
  };

  /* Widget appearance */
  _support.ui.shoutboxFacesMode = "brand-avatar";

  _support.ui.widget = {
    icon: "webChat",
    slug: "endpoint-secure-consulting",
    position: "bottom-right",
    label: {
      text: "Talk to Endpoint Secure Consulting",
      mode: "notification",
      delay: 8
    }
  };

  /* Custom confirmation */
  _support.ui.overrides = _support.ui.overrides || {};
  _support.ui.overrides.confirmationMessage =
    "Thanks! Your message has been submitted. Our Endpoint Secure Consulting team will respond here or via email shortly.";

  /* Customer auth */
  _support.ui.user = {
    authpath: "/m/api/reamaze/v2/customers/auth?brand=39958707"
  };
</script>
</body>
</html>
