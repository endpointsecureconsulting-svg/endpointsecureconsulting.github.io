<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Endpoint Secure Consulting</title>

  <!-- Cookie acceptance -->
  <script>
    document.cookie = "cookie_terms_accepted=true; path=/; max-age=31536000";
  </script>

  <!-- GoDaddy / Reamaze -->
  <script async src="https://cdn.reamaze.com/assets/reamaze-godaddy-loader.js"></script>

  <!-- Widget config -->
  <script>
    var _support = _support || { ui: {}, user: {} };

    _support.account = "ba6a9e34-22c9-460c-a706-0b33aeb2ff05";

    _support.ui.contactMode = "default";
    _support.ui.enableKb = "false";
    _support.ui.mailbox = "80064145";

    _support.ui.styles = {
      widgetColor: "#0b1f3a"
    };

    _support.ui.shoutboxFacesMode = "brand-avatar";

    _support.ui.widget = {
      icon: "webChat",
      slug: "endpoint-secure-consulting",
      position: "bottom-right",
      label: {
        text: "Talk to Endpoint Secure Consulting",
        mode: "notification",
        delay: 0
      }
    };

    function autoOpenChat(retries = 40) {
      /* Preferred: official API */
      if (typeof Reamaze !== "undefined") {
        try {
          Reamaze("open");
          return;
        } catch (e) {}
      }

      /* Fallback: click visible widget launcher */
      const selectors = [
        '.js-rezai-launcher',
        '[aria-label*="chat"]',
        '[aria-label*="message"]',
        '[class*="reamaze-launcher"]',
        '[class*="widget-launcher"]',
        '[id*="reamaze"]'
      ];

      for (let selector of selectors) {
        const btn = document.querySelector(selector);
        if (btn) {
          btn.click();
          return;
        }
      }

      /* Retry until widget fully loads */
      if (retries > 0) {
        setTimeout(function () {
          autoOpenChat(retries - 1);
        }, 500);
      }
    }

    window.onload = function () {
      setTimeout(function () {
        autoOpenChat();
      }, 1200);
    };
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
    }
  </style>
</head>

<body>
</body>
</html>
