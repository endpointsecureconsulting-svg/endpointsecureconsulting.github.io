<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Endpoint Secure Consulting</title>

  <!-- Cookie acceptance required -->
  <script>
    document.cookie = "cookie_terms_accepted=true; path=/; max-age=31536000";
  </script>

  <!-- GoDaddy / Reamaze Loader -->
  <script async src="https://cdn.reamaze.com/assets/reamaze-godaddy-loader.js"></script>

  <!-- Reamaze Configuration -->
  <script>
    var _support = _support || { ui: {}, user: {} };

    _support.account = "ba6a9e34-22c9-460c-a706-0b33aeb2ff05";

    _support.ui.contactMode = "default";
    _support.ui.enableKb = "false";
    _support.ui.mailbox = "80064145";

    _support.ui.styles = {
      widgetColor: "#0b1f3a"
    };

    _support.ui.shoutboxFacesMode = "brand-avatar";

    _support.ui.widget = {
      icon: "webChat",
      slug: "endpoint-secure-consulting",
      position: "bottom-right",
      label: {
        text: "Talk to Endpoint Secure Consulting",
        mode: "notification",
        delay: 0
      }
    };

    /* Open widget fullscreen */
    function launchFullscreenChat(retries = 30) {
      if (typeof Reamaze !== "undefined") {
        Reamaze("open");

        /* Try expanding widget */
        setTimeout(function () {
          const expandButtons = document.querySelectorAll(
            '[aria-label*="expand"], [aria-label*="maximize"], [class*="expand"], [class*="maximize"]'
          );

          if (expandButtons.length > 0) {
            expandButtons[0].click();
          }

          /* Force iframe/chat container fullscreen */
          const chatFrames = document.querySelectorAll(
            "iframe, .reamaze-widget, .reamaze-widget-container, .reamaze-chat, .reamaze-chat-container"
          );

          chatFrames.forEach(function (el) {
            el.style.position = "fixed";
            el.style.top = "0";
            el.style.left = "0";
            el.style.width = "100vw";
            el.style.height = "100vh";
            el.style.maxWidth = "100vw";
            el.style.maxHeight = "100vh";
            el.style.zIndex = "999999";
            el.style.borderRadius = "0";
          });

        }, 1200);

        return;
      }

      if (retries > 0) {
        setTimeout(function () {
          launchFullscreenChat(retries - 1);
        }, 500);
      }
    }

    window.onload = function () {
      launchFullscreenChat();
    };
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
    }
  </style>
</head>

<body>
</body>
</html>
